<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в аккаунт - Skill Link</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="navbar.js" defer></script>
</head>
<body>
<main class="main-content">
    <div class="auth-wrapper">
        <div class="modal-container">
            <a href="/" class="modal-close">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6L18 18" stroke="#ccc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>

            <h2>Вход в аккаунт</h2>
            <form id="signinForm">
                <div class="input-group">
                    <label for="signinEmail">Email</label>
                    <input type="email" id="signinEmail" placeholder="somemail@mail.com" required>
                </div>
                <div class="input-group">
                    <label for="signinPassword">Пароль</label>
                    <input type="password" id="signinPassword" placeholder="Введите пароль" required>
                </div>

                <a href="#" class="forgot-password">Я забыл пароль</a>

                <button type="submit" class="btn btn-primary auth-btn">Войти</button>

                <a href="/signup" class="switch-auth">У меня еще нет аккаунта</a>
            </form>
        </div>
    </div>
</main>

<footer>
    <p>© 2024 Skill Link — сервис для создания, поиска команды.</p>
    <div class="footer-links">
        <a href="#">Контактная информация</a>
        <a href="#">Политика конфиденциальности</a>
        <a href="#">Пользовательское соглашение</a>
    </div>
</footer>

<script src="auth.js"></script>
</body>
</html>
